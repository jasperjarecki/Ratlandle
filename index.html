    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0
    }

    :root {
        --k: #0a0a0a;
        --w: #f5f3ef;
        --ow: #e8e4dc;
        --mid: #b8b0a4;
        --dim: #6b6560;
        --bd: 1.5px solid #0a0a0a
    }

    html, body, #root {
        height: 100dvh;
        background: var(--w);
        color: var(--k);
        font-family: 'MADE Sunflower', serif
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
        opacity: .6
    }

    .app {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 1rem 4rem;
        max-width: 540px;
        margin: 0 auto;
        width: 100%
    }

    .hdr {
        width: 100%;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        padding: 1.4rem 0 1rem;
        border-bottom: var(--bd)
    }

    .logo {
        font-family: 'MADE Sunflower', serif;
        font-size: 1.9rem;
        letter-spacing: -.03em;
        line-height: 1
    }

    .logo small {
        font-size: .52rem;
        letter-spacing: .18em;
        text-transform: uppercase;
        display: block;
        color: var(--dim);
        margin-top: 2px
    }

    .hdr-r {
        display: flex;
        align-items: center;
        gap: .8rem
    }

    .ghost {
        background: none;
        border: none;
        cursor: pointer;
        font-family: 'MADE Sunflower', serif;
        font-size: .68rem;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: var(--dim);
        padding: .25rem 0;
        transition: color .15s
    }

    .ghost:hover {
        color: var(--k)
    }

    .game {
        width: 100%;
        margin-top: 1.4rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem
    }

    .date-lbl {
        font-size: .62rem;
        letter-spacing: .2em;
        text-transform: uppercase;
        color: var(--dim);
        text-align: center
    }

    .prog-row {
        display: flex;
        gap: 5px;
        width: 100%
    }

    .seg {
        flex: 1;
        height: 4px;
        background: var(--ow);
        border-radius: 2px;
        overflow: hidden;
        position: relative
    }

    .seg.wrong {
        background:var(--mid)
    }

    .seg.correct, .seg.used {
        background:var(--k)
    }

    .seg.skipped {
        background: var(--mid)
    }

    .seg.active::after {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: var(--fill, 0%);
        background: var(--k);
        transition: width .05s linear
    }

    .player {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: .9rem
    }

    .rat-wrap {
        position: relative;
        width: min(190px, 52vw);
        height: min(190px, 52vw);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none
    }

    .rat-wrap:hover .rat-inner {
        transform: scale(1.04)
    }

    .rat-wrap:active .rat-inner {
        transform: scale(0.96)
    }

    .rat-wrap.disabled {
        cursor: not-allowed;
        opacity: .45
    }

    .rat-inner {
        transition: transform .15s;
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center
    }

    .rat-ring-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none
    }

    @keyframes ratwobble {
        0% {
            transform:rotate(-2deg) scale(1.02)
        }

        25% {
            transform:rotate(2deg) scale(1.03)
        }

        50% {
            transform:rotate(-1.5deg) scale(1.02)
        }

        75% {
            transform:rotate(1.5deg) scale(1.025)
        }

        100% {
            transform: rotate(-2deg) scale(1.02)
        }

    function arc(cx, cy, r, a1, a2) {
        const rad = d => (d - 90) * Math.PI / 180;
        const x1 = cx + r * Math.cos(rad(a1)),
            y1 = cy + r * Math.sin(rad(a1));
        const x2 = cx + r * Math.cos(rad(a2)),
            y2 = cy + r * Math.sin(rad(a2));
        return `M${x1} ${y1}A${r} ${r} 0 ${a2 - a1 > 180 ? 1 : 0} 1 ${x2} ${y2}`;
    }

    function RatRing({guesses, progress, gameOver}) {
        const S = 190,
            CX = 95,
            CY = 95,
            R = 88,
            SW = 8,
            GAP = 5;
        const segA = (360 - MAX * GAP) / MAX;
        const segs = [];
        for (let i = 0; i < MAX; i++) {
            const a1 = i * (segA + GAP),
                a2 = a1 + segA;
            const g = guesses[i];
            const isCur = i === guesses.length && !gameOver;
            segs.push(h('path', {
                key: 't' + i,
                d: arc(CX, CY, R, a1, a2),
                stroke: '#e8e4dc',
                strokeWidth: SW,
                fill: 'none',
                strokeLinecap: 'round'
            }));
            if (g) {
                segs.push(h('path', {
                    key: 'f' + i,
                    d: arc(CX, CY, R, a1, a2),
                    stroke: g.correct ? '#0a0a0a' : '#b8b0a4',
                    strokeWidth: SW,
                    fill: 'none',
                    strokeLinecap: 'round'
                }));
            } else if (isCur && progress > 0) {
                const circ = (segA / 360) * 2 * Math.PI * R;
                segs.push(h('path', {
                    key: 'a' + i,
                    d: arc(CX, CY, R, a1, a2),
                    stroke: '#0a0a0a',
                    strokeWidth: SW,
                    fill: 'none',
                    strokeLinecap: 'round',
                    strokeDasharray: `${(progress / 100) * circ} ${circ * 2}`
                }));
            }
        }
        return h('svg', {
            className: 'rat-ring-svg',
            viewBox: '0 0 190 190'
        }, ...segs);
    }

    function Game({user, onSignOut}) {
        const song = getDailySong();

        const [input, setInput] = useState('');

        const [showDD, setShowDD] = useState(false);

        const [gameOver, setGameOver] = useState(false);
        const [won, setWon] = useState(false);
        const [progress, setProgress] = useState(0);
        const [showLB, setShowLB] = useState(false);
        const [toast, setToast] = useState(null);
        const [myStats, setMyStats] = useState(null);
        const [alreadyPlayed, setAlreadyPlayed] = useState(false);
        const [savedGuesses, setSavedGuesses] = useState([]);
        const audioRef = useRef(null);
        const ivRef = useRef(null);
        const inputRef = useRef(null);

        const ci = guesses.length;
        const clipDur = CLIPS[Math.min(ci, MAX - 1)];

        useEffect(() => {
            loadState()
        }, []);

        async function loadState() {
            const {data: profile} = await sb.from('profiles').select('*').eq('id', user.id).single();
            const {data: result} = await sb.from('game_results')
            .select('*').eq('user_id', user.id).eq('game_date', today()).single();
            if (result) {
                setAlreadyPlayed(true);
                setSavedGuesses(result.guesses || []);
                setGameOver(true);
                setWon(result.won);
                setMyStats({
                    ...profile,
                    guess_count: result.guess_count,
                    won: result.won
                });
            } else {
                setMyStats(profile);
            }
        }

        function showToast(msg) {
            setToast(msg);
            setTimeout(() => setToast(null), 2700)
        }

        useEffect(() => {
            const q = input.trim().toLowerCase();
            if (!q) {
                setFiltered([]);
                setShowDD(false);
                return
            }
            const res = SONGS.filter(s => s.title.toLowerCase().includes(q)).slice(0, 7);
            setFiltered(res);
            setShowDD(res.length > 0);
        }, [input]);

        function playClip() {
            if (playing || gameOver)
                return;
            clearInterval(ivRef.current);

            // Create fresh audio each time — most reliable on iOS
            const audio = new Audio();
            audioRef.current = audio;
            audio.volume = 0.9;

            function startTimer() {
                setPlaying(true);
                setProgress(0);
                const start = Date.now();
                ivRef.current = setInterval(() => {
                    const el = (Date.now() - start) / 1000;
                    setProgress(Math.min((el / clipDur) * 100, 100));
                    if (el >= clipDur) {
                        clearInterval(ivRef.current);
                        audio.pause();
                        audioRef.current = null;
                        setPlaying(false);
                        setProgress(0);
                    }
                }, 50);
            }

            audio.addEventListener('playing', function onPlaying() {
                audio.removeEventListener('playing', onPlaying);
                startTimer();
            });

            // Set src and currentTime, then play — all synchronous setup before play()
            audio.src = song.audio;
            audio.currentTime = startOffset;
            audio.play().catch(() => setPlaying(false));
        }

        useEffect(() => () => {
            clearInterval(ivRef.current);
            if (audioRef.current)
                audioRef.current.pause()
        }, []);

        async function saveResult(fg, dw) {
            const gc = fg.filter(g => !g.skipped).length;
            const {data: prev} = await sb.from('profiles').select('*').eq('id', user.id).single();
            const yest = new Date(Date.now() - 86400000).toLocaleDateString('en-CA', {
                timeZone: 'America/New_York'
            });
            const ns = dw ? (prev?.last_played === yest ? (prev.current_streak || 0) + 1 : 1) : 0;
            const np = {
                total_games: (prev?.total_games || 0) + 1,
                total_wins: (prev?.total_wins || 0) + (dw ? 1 : 0),
                current_streak: ns,
                best_streak: Math.max(prev?.best_streak || 0, ns),
                last_played: today()

            await sb.from('profiles').update(np).eq('id', user.id);

                game_date: today(),

            }

            }

            const fg = alreadyPlayed ? savedGuesses : guesses;

            const firstLine = fw
            ? `I got today's Ratlandle in ${guessCount} guess${guessCount !== 1 ? 'es' : ''}!`

            const bars = fg.map(g => g.skipped ? '⬜' : g.correct ? '⬛' : '🔲').join('');
            const text = fw
            ? `${firstLine}\n\n🐀🐀🐀\n\n${bars}\n\nratlandle.com`
            : `${firstLine}\n\n🐀🐀🐀\n\nratlandle.com`;
            navigator.clipboard.writeText(text).then(() => showToast('copied!')).catch(() => showToast('copied!'));
        }

        const fw = alreadyPlayed ? won : won;

            if (!g)

            return 'wrong';

            key: s.id,
            className: 'dd-item',
            onMouseDown: () => {
                setInput(s.title);
                setShowDD(false);
                inputRef.current && inputRef.current.focus()
            }
        },
        h('span', {
            className: 'st'
        }, s.title)))
        ),
        h('button', {
            className: 'btn-skip',
            onClick: skipGuess
        }, 'skip →')
        ),
        gameOver && h('div', {
            className: 'rpanel'
        },
        h('div', {
            className: 'rtitle'
        }, fw ? (() => {
            const gc = fg.filter(g => !g.skipped).length;
            if (gc === 1)
                return 'You got it! First try! 🐀';
            if (gc === 2)
                return 'You got it! Second try! 🐀';
            if (gc === 3)
                return 'You got it! Third try! 🐀';
            return `You got it! Guess ${gc}! 🐀`;
        })() : 'Rats! Better luck tomorrow 🐀'),
        h('div', null, h('div', {
            className: 'rsong'
        }, song.title)),
        myStats && h('div', {
            className: 'stats'
        },
        h('div', {
            className: 'sc'
        }, h('span', {
            className: 'sn'
        }, myStats.current_streak || 0), h('span', {
            className: 'sl'
        }, 'streak')),
        h('div', {
            className: 'sc'
        }, h('span', {
            className: 'sn'
        }, myStats.total_games > 0 ? Math.round((myStats.total_wins / myStats.total_games) * 100) + '%' : '0%'), h('span', {
            className: 'sl'
        }, 'win rate')),
        h('div', {
            className: 'sc'
        }, h('span', {
            className: 'sn'
        }, myStats.total_wins || 0), h('span', {
            className: 'sl'
        }, 'wins'))
        ),
        h('div', {
            className: 'share-row'
        },
        h('button', {
            className: 'btn-shr',
            onClick: copyShare
        }, 'copy result'),
        h('button', {
            className: 'btn-shr out',
            onClick: () => setShowLB(true)
        }, 'leaderboard')
        )
        )
        ),
        h('div', {
            className: 'ftr'
        },
        'Thanks for playing! See you tomorrow ;)',
        h('br'),
        h('br'),
        'While you wait for tomorrow\'s game, check us out on ',
        h('a', {
            href: 'https://ratlandtheband.bandcamp.com',
            target: '_blank',
            style: {
                color: 'var(--k)',
                textDecoration: 'underline'
            }
        }, 'Bandcamp')
        )
        ),
        showLB && h(LBModal, {
            onClose: () => setShowLB(false),
            userId: user.id
        }),
        toast && h('div', {
            className: 'toast'
        }, toast)
        );
    }

    function App() {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
            const stored = localStorage.getItem('ratlandle_user');
            if (stored) {
                try {
                    setUser(JSON.parse(stored))
                } catch (e) {}
            }
            setLoading(false);
        }, []);

        function handleAuth(u) {
            localStorage.setItem('ratlandle_user', JSON.stringify(u));
            setUser(u);
        }

        function handleSignOut() {
            localStorage.removeItem('ratlandle_user');
            setUser(null);
        }

        if (loading)
            return h('div', {
                className: 'loading'
            },
            h('div', {
                style: {
                    fontFamily: "'MADE Sunflower',serif",
                    fontSize: '2rem'
                }
            }, 'Ratlandle'),
            h('div', {
                className: 'ldots'
            }, h('span'), h('span'), h('span'))
            );
        if (!user)
            return h(Auth, {
                onAuth: handleAuth
            });
        return h(Game, {
            user,
            onSignOut: handleSignOut
        });
    }

    ReactDOM.render(h(App, null), document.getElementById('root'));
    </script>
</body>
</html>
